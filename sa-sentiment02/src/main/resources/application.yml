spring:
  mail:
    host: smtp.qq.com
    port: 587
#    //自己的邮箱以及密钥
    username: ${MAIL_USERNAME:xxxxxxxxx}
    password: ${MAIL_PASSWORD:xxxxxxxxxx}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://localhost:3306/sentiment_analysis?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 9090

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 验证码图片设置
#captcha:
#  image:
#    width: 120
#    height: 40
#    length: 4

# FastAPI模型服务配置
fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
  timeout: ${FASTAPI_TIMEOUT:30}

# 日志配置
logging:
  level:
    root: info
    com.wei: debug
